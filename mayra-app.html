function pad(n){return String(n).padStart(2,"0");}

function getCountdown(){
  const now = new Date();
  const diff = WEDDING - now;
  if(diff<=0)return{done:true};
  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);
  return{days:d,hours:h,minutes:m,seconds:s,months:Math.floor(d/30),weeks:Math.floor(d/7)};
}

function mealCard(m){
  const icons={breakfast:"🌅 Breakfast",lunch:"☀️ Lunch",dinner:"🌙 Dinner",snack:"🍎 Snack"};
  return ['breakfast','lunch','dinner','snack'].map(k=>{
    const meal=m[k];
    const tags=meal.tags?`<div class="tags">${meal.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
    return`<div class="card"><div class="card-label">${icons[k]}</div><div class="card-title">${meal.title}</div>${tags}<ul>${meal.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
  }).join('');
}

function render(){
  let html='';
  if(currentTab==='countdown') html=renderCountdown();
  else if(currentTab==='meals') html=renderMeals();
  else if(currentTab==='workout') html=renderWorkout();
  else if(currentTab==='supplements') html=renderSupplements();
  else if(currentTab==='running') html=renderRunning();
  else if(currentTab==='home') html=renderHome();
  document.getElementById('app-content').innerHTML=html;
  startClock();
}

let clockInterval=null;
function startClock(){
  if(clockInterval)clearInterval(clockInterval);
  if(currentTab!=='countdown')return;
  clockInterval=setInterval(()=>{
    const cd=getCountdown();
    const ds=document.getElementById('cd-days');
    const hs=document.getElementById('cd-hours');
    const ms=document.getElementById('cd-mins');
    const ss=document.getElementById('cd-secs');
    if(ds)ds.textContent=pad(cd.days);
    if(hs)hs.textContent=pad(cd.hours);
    if(ms)ms.textContent=pad(cd.minutes);
    if(ss)ss.textContent=pad(cd.seconds);
  },1000);
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  showAddRun=false;
  render();
  window.scrollTo(0,0);
}

function setDay(d){currentDay=d;render();}
function setHomeDay(d){homeDay=d;render();}

function startAddRun(){showAddRun=true;render();}
function cancelRun(){showAddRun=false;render();}

function saveRun(){
  const date=document.getElementById('run-date')?.value;
  const pace=document.getElementById('run-pace')?.value;
  const time=document.getElementById('run-time')?.value;
  const note=document.getElementById('run-note')?.value;
  if(!date||!pace)return;
  const newRun={date,pace,time,note,distance:"1.01",pr:false};
  const updated=[...runLog,newRun];
  const paces=updated.map(r=>paceToParts(r.pace));
  const minPace=Math.min(...paces);
  if(paceToParts(pace)===minPace){
    updated.forEach(r=>r.pr=false);
    updated[updated.length-1].pr=true;
  }
  runLog=updated;
  localStorage.setItem("mayra_runs",JSON.stringify(runLog));
  showAddRun=false;
  render();
}

render();
